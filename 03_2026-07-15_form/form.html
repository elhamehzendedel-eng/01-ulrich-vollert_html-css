<section id="contact">
<h2>Kontaktformular</h2>
<p>Schreib mir gerne direkt über das Kontaktformular</p>
<form action="/kontakt" method="post">
<input type="text" name="name" required minlength="2" maxlength="50">
<input type="email" name="email" required>-Email-Adresse Required
<input type="tel" name="telefon" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" title="Telefonnummer im Format 123-456-7890">Telefonnummer (optional)
<select name="betreff" required>
  <option value="" disabled selected>— bitte wählen —</option>
  <option value="frage">Allgemeine Frage</option>
  <option value="angebot">Angebotsanfrage</option>
  <option value="feedback">Feedback</option>
  </select>
<textarea rows="6" required placeholder="Nachricht"></textarea>
<button type="submit">Absenden</button>
</form>
</section>
