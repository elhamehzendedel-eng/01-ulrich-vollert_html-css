<svg width="220" height="280" viewBox="0 0 220 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyObsidian" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3A4750"/>
      <stop offset="35%" stop-color="#161F24"/>
      <stop offset="70%" stop-color="#0A1114"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="capObsidian" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A5860"/>
      <stop offset="100%" stop-color="#12181C"/>
    </linearGradient>
    <radialGradient id="shadowObsidian" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0E3A4C" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0E3A4C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ledGlowO" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7FE8F7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7FE8F7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="220" height="280" rx="16" fill="#F5FBFC"/>

  <!-- Bodenschatten -->
  <ellipse cx="110" cy="248" rx="58" ry="12" fill="url(#shadowObsidian)"/>

  <!-- Deckel -->
  <path d="M 88,22 C 88,14 94,8 110,8 C 126,8 132,14 132,22 L 132,40 L 88,40 Z" fill="url(#capObsidian)"/>
  <rect x="94" y="36" width="32" height="10" rx="3" fill="#000000" opacity="0.3"/>

  <!-- Flaschenkörper -->
  <path d="M 110,40
           C 96,40 90,50 90,60
           L 90,72
           C 66,82 58,102 58,128
           L 58,214
           C 58,236 78,250 110,250
           C 142,250 162,236 162,214
           L 162,128
           C 162,102 154,82 130,72
           L 130,60
           C 130,50 124,40 110,40 Z"
        fill="url(#bodyObsidian)"/>

  <!-- Lichtreflexion -->
  <path d="M 74,100 C 70,120 70,190 74,220" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" opacity="0.12"/>

  <!-- Bedienknopf mit Leuchteffekt -->
  <circle cx="110" cy="118" r="20" fill="url(#ledGlowO)"/>
  <circle cx="110" cy="118" r="9" fill="#0B1013"/>
  <circle cx="110" cy="118" r="4" fill="#5FD3E8"/>
</svg>
